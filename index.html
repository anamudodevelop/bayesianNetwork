<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Predictive Maintenance System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:900px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    color:#1e3a5f;
    margin-bottom:10px;
}

.header p{
    color:gray;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    font-weight:600;
    color:#2c3e50;
}

select{
    padding:12px;
    border:1px solid #d6dce5;
    border-radius:8px;
    font-size:15px;
    background:white;
}

select:focus{
    outline:none;
    border-color:#1e88e5;
}

.button-container{
    text-align:center;
    margin-top:35px;
}

button{
    background:#1e3a5f;
    color:white;
    border:none;
    padding:15px 45px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#29588d;
}

.footer{
    text-align:center;
    margin-top:25px;
    color:gray;
    font-size:14px;
}

@media(max-width:768px){

.form-grid{
    grid-template-columns:1fr;
}

.container{
    width:95%;
}

}

</style>

</head>
<body>

<div class="container">

<div class="header">
<h1>Predictive Maintenance System</h1>
<p>Bayesian Network-Based Engine Fault Prediction</p>
</div>

<form action="http://127.0.0.1:5000/predict" method="post">

<div class="form-grid">

<div class="form-group">
<label>Engine RPM</label>
<select name="rpm">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Engine Oil Pressure</label>
<select name="oil">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Coolant Temperature</label>
<select name="coolant">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Intake Manifold Pressure</label>
<select name="intakepressure">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Intake Manifold Temperature</label>
<select name="intaketemperature">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Transmission Oil Pressure</label>
<select name="transmissionoilpressure">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Transmission Oil Temperature</label>
<select name="transmissionoiltemperature">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Machine Speed</label>
<select name="machinespeed">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

</div>

<div class="button-container">
<button type="submit">
Predict Fault Risk
</button>
</div>

</form>

<div class="footer">
Powered by Bayesian Network AI • Predictive Maintenance Dashboard
</div>

</div>

</body>
</html>
